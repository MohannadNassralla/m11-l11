name: lab-11-service-monitoring Autograder

on:
  push:
    branches:
      - lab-11-service-monitoring
  pull_request:
    branches:
      - main

jobs:
  autograder:
    runs-on: ubuntu-latest

    # Tier 4 services for the live-stack smoke test. The unit autograder tests
    # (test_metrics_endpoint, test_middlewares, test_smoke_evaluator's unit
    # cases, test_learner_test_complete) run against an in-process TestClient
    # and do not require these services to be healthy. The live-stack smoke
    # test (test_smoke_evaluator_exits_zero) is gated on M11_LIVE_STACK=1 and
    # API_URL; this workflow starts the learner API, waits for /readyz, and
    # sets both env vars before pytest so the live-stack test executes in CI
    # rather than being silently skipped.
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/devpassword
          NEO4J_dbms_memory_heap_max__size: 1G
          NEO4J_dbms_memory_pagecache_size: 512M
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -a bolt://localhost:7687 -u neo4j -p devpassword 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-retries 18
          --health-start-period 30s
      weaviate:
        image: semitechnologies/weaviate:1.24.10
        ports:
          - 8080:8080
        env:
          QUERY_DEFAULTS_LIMIT: "25"
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: /var/lib/weaviate
          DEFAULT_VECTORIZER_MODULE: none
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8080/v1/.well-known/ready || exit 1"
          --health-interval 10s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Seed Neo4j
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: devpassword
        run: |
          if [ -f seed_neo4j.sh ]; then
            bash seed_neo4j.sh
          else
            echo "seed_neo4j.sh not present — skipping"
          fi

      - name: Seed Weaviate
        env:
          WEAVIATE_URL: http://localhost:8080
        run: |
          if [ -f seed_weaviate.sh ]; then
            bash seed_weaviate.sh
          else
            echo "seed_weaviate.sh not present — skipping"
          fi

      - name: Start learner API
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: devpassword
          WEAVIATE_URL: http://localhost:8080
          WEB_ORIGIN: http://localhost:3000
        run: |
          nohup python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 \
            > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API /readyz
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8000/readyz >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in 90s; api.log:"
          cat api.log || true
          exit 1

      - name: Run autograder tests
        env:
          API_URL: http://localhost:8000
          M11_LIVE_STACK: "1"
        run: |
          pytest tests/ -v --tb=short

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" || true; fi
