# M10 four-service stack with the M11 instrumentation hooks wired into `api`.
# Learner brings up via: docker compose up -d
version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-devpassword}
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p ${NEO4J_PASSWORD:-devpassword} 'RETURN 1' || exit 1"]
      interval: 10s
      retries: 18
      start_period: 30s

  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      retries: 12

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-devpassword}
      - WEAVIATE_URL=http://weaviate:8080
      - WEB_ORIGIN=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy

  # The web/ folder does not ship Next.js source in the Lab template, so this
  # service fails to build on a fresh `docker compose up -d`. It is gated
  # behind a `frontend` profile so the default `docker compose up -d` skips
  # it; opt in with `docker compose --profile frontend up -d` if you also
  # have the M10 frontend source mounted.
  web:
    profiles: ["frontend"]
    build:
      context: ./web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
